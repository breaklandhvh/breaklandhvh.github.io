        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: #050505; color: #ffffff;
            font-family: 'Courier New', Courier, monospace;
            display: flex; justify-content: center; align-items: center;
            width: 100vw; height: 100vh; overflow: hidden; position: relative;
        }
        body::before {
            content: " "; display: block; position: absolute; top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.4) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.04), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.04));
            z-index: 10; background-size: 100% 4px, 6px 100%; pointer-events: none;
        }
        body::after {
            content: " "; display: block; position: absolute; top: 0; left: 0; bottom: 0; right: 0;
            background: radial-gradient(circle, rgba(0,0,0,0) 40%, rgba(0,0,0,0.9) 100%);
            z-index: 9; pointer-events: none;
        }
        .top-left-link {
            position: absolute; top: 15px; left: 20px; z-index: 20; color: #55ff55;
            font-size: 0.85rem; font-weight: bold; text-transform: uppercase;
            text-decoration: none; letter-spacing: 2px; text-shadow: 0 0 5px rgba(85, 255, 85, 0.6);
            transition: all 0.2s ease;
        }
        .top-left-link:hover {
            color: #ffffff; text-shadow: 2px 2px #ff0055, -2px -2px #00ffaa;
            animation: button-glitch 0.3s infinite;
        }
        .wrapper {
            display: grid; grid-template-columns: 250px 1fr 250px; gap: 20px;
            width: 95%; max-width: 1300px; height: 80vh; z-index: 2; margin-top: 20px;
        }
        .terminal-panel {
            border: 2px dashed rgba(220, 220, 220, 0.3); background: rgba(10, 10, 10, 0.7);
            padding: 20px; overflow: hidden; position: relative; box-shadow: 0 0 15px rgba(0, 0, 0, 0.5);
        }
        .log-panel { font-size: 0.75rem; color: #55ff55; display: flex; flex-direction: column; gap: 5px; }
        .log-title {
            color: #fff; border-bottom: 1px solid rgba(220, 220, 220, 0.3);
            padding-bottom: 5px; margin-bottom: 10px; font-weight: bold; letter-spacing: 1px;
        }
        .info-panel { font-size: 0.85rem; color: rgba(255, 255, 255, 0.7); line-height: 1.6; }
        .info-panel span { color: #55ff55; }
        .main-box { display: flex; flex-direction: column; justify-content: center; align-items: center; border: 2px dashed #dcdcdc; padding: 40px; text-align: center; }
        .corner-tag { position: absolute; top: 8px; left: 14px; color: #55ff55; font-weight: bold; font-size: 1.4rem; }
        .logo {
            font-size: 3.8rem; font-weight: 900; letter-spacing: 2px; text-transform: uppercase;
            line-height: 1.1; margin-bottom: 10px; color: #eeeeee;
            text-shadow: 3px 3px #ff0055, -3px -3px #00ffaa; animation: glitch 2.5s infinite;
        }
        .footer-text { color: #55ff55; font-size: 1.4rem; letter-spacing: 3px; text-transform: lowercase; text-shadow: 0 0 8px rgba(85, 255, 85, 0.6); margin-bottom: 35px; }
        .cursor { display: inline-block; animation: blink 0.8s infinite; }
        .links-container { display: flex; gap: 15px; }
        .btn {
            display: flex; justify-content: center; align-items: center; width: 50px; height: 50px;
            font-size: 1.5rem; color: #ffffff; background: transparent; border: 2px solid #ffffff;
            cursor: pointer; text-decoration: none; transition: all 0.2s ease; box-shadow: 0 0 8px rgba(255, 255, 255, 0.1);
        }
        .btn-steam:hover { color: #00ffaa; border-color: #00ffaa; box-shadow: 0 0 15px rgba(0, 255, 170, 0.5); animation: button-glitch 0.3s infinite; }
        .btn-tg:hover { color: #ff0055; border-color: #ff0055; box-shadow: 0 0 15px rgba(255, 0, 85, 0.5); animation: button-glitch 0.3s infinite; }
        @keyframes glitch {
            0% { text-shadow: 3px 3px #ff0055, -3px -3px #00ffaa; transform: skew(0deg); }
            30% { text-shadow: 3px 3px #ff0055, -3px -3px #00ffaa; transform: skew(0deg); }
            31% { text-shadow: -5px 2px #ff0055, 5px -2px #00ffaa; transform: skew(-6deg); filter: blur(0.5px); }
            33% { text-shadow: 5px -2px #ff0055, -4px 3px #00ffaa; transform: skew(4deg); }
            34% { text-shadow: 3px 3px #ff0055, -3px -3px #00ffaa; transform: skew(0deg); filter: none; }
            100% { text-shadow: 3px 3px #ff0055, -3px -3px #00ffaa; transform: skew(0deg); }
        }
        @keyframes button-glitch {
            0% { transform: translate(0) skew(0deg); }
            20% { transform: translate(-1px, 1px) skew(-2deg); }
            40% { transform: translate(1px, -1px) skew(2deg); }
            60% { transform: translate(0) skew(0deg); }
            100% { transform: translate(0) skew(0deg); }
        }
        @keyframes blink { 0%, 49% { opacity: 1; } 50%, 100% { opacity: 0; } }
        @media (max-width: 900px) {
            .top-left-link { position: relative; top: auto; left: auto; margin-bottom: 15px; display: block; text-align: center;}
            .wrapper { grid-template-columns: 1fr; height: auto; overflow-y: auto; margin-top: 0; }
            .log-panel, .info-panel { display: none; }
            .logo { font-size: 2.3rem; }
            .footer-text { font-size: 1.1rem; }
        }
    </style>
</head>
