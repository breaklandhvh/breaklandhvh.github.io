<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>breaklandhvh</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #030303;
            color: #ffffff;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* Задний фон - Канвас для летающих частиц */
        #particles-js {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: 1;
        }

        /* Эффект ЭЛТ-монитора */
        body::before {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.4) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            z-index: 10;
            background-size: 100% 4px, 6px 100%;
            pointer-events: none;
        }

        /* Виньетка */
        body::after {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: radial-gradient(circle, rgba(0,0,0,0) 30%, rgba(0,0,0,0.95) 100%);
            z-index: 9;
            pointer-events: none;
        }

        /* Ссылка сверху слева */
        .top-left-link {
            position: absolute;
            top: 15px;
            left: 20px;
            z-index: 20;
            color: #55ff55;
            font-size: 0.85rem;
            font-weight: bold;
            text-transform: uppercase;
            text-decoration: none;
            letter-spacing: 2px;
            text-shadow: 0 0 5px rgba(85, 255, 85, 0.6);
            transition: all 0.2s ease;
        }

        .top-left-link:hover {
            color: #ffffff;
            text-shadow: 2px 2px #ff0055, -2px -2px #00ffaa;
            animation: button-glitch 0.3s infinite;
        }

        /* Заставка перед входом */
        #overlay {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background-color: #050505;
            z-index: 999;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: opacity 0.5s ease;
        }
        #overlay .click-text {
            font-size: 1.5rem;
            letter-spacing: 5px;
            color: #55ff55;
            text-shadow: 0 0 10px #55ff55;
            animation: pulse 1.5s infinite;
        }

        /* Главная карточка */
        .bio-card {
            background: rgba(10, 10, 10, 0.75);
            border: 2px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            width: 100%;
            max-width: 550px;
            padding: 50px 30px;
            text-align: center;
            position: relative;
            z-index: 5;
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.8);
        }

        .logo {
            font-size: 3.5rem;
            font-weight: 900;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #eeeeee;
            text-shadow: 4px 4px #ff0055, -4px -4px #00ffaa;
            animation: glitch 2.5s infinite;
            margin-bottom: 10px;
            margin-top: -10px;
        }

        .footer-text {
            color: #55ff55;
            font-size: 1.3rem;
            letter-spacing: 3px;
            text-transform: lowercase;
            text-shadow: 0 0 8px rgba(85, 255, 85, 0.5);
            margin-bottom: 40px;
        }
        .cursor { display: inline-block; animation: blink 0.8s infinite; }

        /* Обновленный музыкальный плеер */
        .now-playing {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 12px 20px;
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.5);
            margin-bottom: 40px;
            display: flex;
            align-items: center;
            justify-content: space-between; /* Распределяем элементы управления */
            gap: 15px;
        }
        
        .player-controls {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        /* Кнопка паузы */
        .play-pause-btn {
            color: #ff0055;
            cursor: pointer;
            transition: transform 0.2s ease, color 0.2s ease;
            font-size: 1rem;
        }
        .play-pause-btn:hover {
            transform: scale(1.1);
            color: #55ff55;
        }

        /* Контейнер кастомного ползунка громкости */
        .volume-container {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .volume-container i {
            color: rgba(255, 255, 255, 0.4);
            font-size: 0.8rem;
        }
        
        /* Стилизация ползунка */
        .volume-slider {
            -webkit-appearance: none;
            appearance: none;
            width: 70px;
            height: 3px;
            background: rgba(255, 255, 255, 0.2);
            background-image: linear-gradient(#55ff55, #55ff55);
            background-size: 40% 100%; /* Дефолтное значение под 0.4 громкости */
            background-repeat: no-repeat;
            border-radius: 2px;
            cursor: pointer;
            transition: width 0.3s ease;
        }
        .volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 10px;
            width: 10px;
            border-radius: 50%;
            background: #55ff55;
            box-shadow: 0 0 5px #55ff55;
        }
        .volume-slider::-moz-range-thumb {
            height: 10px;
            width: 10px;
            border: none;
            border-radius: 50%;
            background: #55ff55;
            box-shadow: 0 0 5px #55ff55;
        }

        .links-container {
            display: flex;
            justify-content: center;
            gap: 25px;
        }
        .btn {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 65px;
            height: 65px;
            font-size: 2rem;
            color: #ffffff;
            background: transparent;
            border: 2px solid rgba(255, 255, 255, 0.2);
            cursor: pointer;
            text-decoration: none;
            transition: all 0.3s ease;
        }
        .btn-steam:hover { color: #00ffaa; border-color: #00ffaa; box-shadow: 0 0 25px rgba(0, 255, 170, 0.4); animation: button-glitch 0.3s infinite; }
        .btn-tg:hover { color: #ff0055; border-color: #ff0055; box-shadow: 0 0 25px rgba(255, 0, 85, 0.4); animation: button-glitch 0.3s infinite; }

        /* Анимации */
        @keyframes glitch {
            0% { text-shadow: 4px 4px #ff0055, -4px -4px #00ffaa; transform: skew(0deg); }
            30% { text-shadow: 4px 4px #ff0055, -4px -4px #00ffaa; transform: skew(0deg); }
            31% { text-shadow: -6px 3px #ff0055, 6px -3px #00ffaa; transform: skew(-5deg); }
            33% { text-shadow: 6px -3px #ff0055, -5px 4px #00ffaa; transform: skew(4deg); }
            34% { text-shadow: 4px 4px #ff0055, -4px -4px #00ffaa; transform: skew(0deg); }
            100% { text-shadow: 4px 4px #ff0055, -4px -4px #00ffaa; transform: skew(0deg); }
        }
        @keyframes button-glitch { 0% { transform: translate(0); } 20% { transform: translate(-1px, 1px); } 40% { transform: translate(1px, -1px); } 100% { transform: translate(0); } }
        @keyframes blink { 0%, 49% { opacity: 1; } 50%, 100% { opacity: 0; } }
        @keyframes pulse { 0%, 100% { opacity: 0.6; } 50% { opacity: 1; } }
    </style>
</head>
<body>

    <div id="particles-js"></div>

    <div id="overlay" onclick="startBio()">
        <div class="click-text">[ CLICK TO ENTER ]</div>
    </div>

    <a href="https://nixware.cc" target="_blank" class="top-left-link">> best cheat</a>

    <div class="bio-card">
        <h1 class="logo">breaklandhvh</h1>
        <p class="footer-text">hvh founder<span class="cursor">_</span></p>

        <div class="now-playing">
            <div class="player-controls">
                <i class="fa-solid fa-music play-pause-btn" id="play-icon" onclick="toggleMusic()" title="Пауза/Плей"></i>
                <span id="track-status">Playing: hvh_track.mp3</span>
            </div>
            
            <div class="volume-container">
                <i class="fa-solid fa-volume-low"></i>
                <input type="range" min="0" max="1" step="0.01" value="0.4" class="volume-slider" id="volume-control">
            </div>
        </div>
        
        <div class="links-container">
            <a href="https://steamcommunity.com/profiles/76561198987439384/" target="_blank" class="btn btn-steam" title="Steam">
                <i class="fa-brands fa-steam"></i>
            </a>
            <a href="https://t.me/scum0fsociety" target="_blank" class="btn btn-tg" title="Telegram">
                <i class="fa-brands fa-telegram"></i>
            </a>
        </div>
    </div>

    <audio id="bg-music" loop>
        <source src="https://www.image2url.com/r2/default/audio/1779825707135-c174d089-0f0a-4ee9-9a12-974158b3904b.mp3" type="audio/mpeg">
    </audio>

    <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
    <script>
        const audio = document.getElementById('bg-music');
        const playIcon = document.getElementById('play-icon');
        const volumeControl = document.getElementById('volume-control');
        const trackStatus = document.getElementById('track-status');

        // Анимация названия вкладки
        const nickname = "breaklandhvh";
        let index = 0;
        setInterval(() => {
            let animatedText = "";
            for (let i = 0; i < nickname.length; i++) {
                animatedText += (i === index) ? nickname[i].toUpperCase() : nickname[i].toLowerCase();
            }
            document.title = animatedText;
            index = (index + 1) % nickname.length;
        }, 200);

        // Вход и старт музыки
        function startBio() {
            document.getElementById('overlay').style.opacity = '0';
            setTimeout(() => { document.getElementById('overlay').style.display = 'none'; }, 500);
            
            audio.volume = 0.4;
            audio.play().catch(e => console.log("Автоплей заблокирован:", e));
        }

        // Функция Паузы / Плея
        function toggleMusic() {
            if (audio.paused) {
                audio.play();
                playIcon.className = "fa-solid fa-music play-pause-btn"; // Возвращаем ноту
                trackStatus.innerText = "Playing: hvh_track.mp3";
                playIcon.style.animation = "pulse 1s infinite";
            } else {
                audio.pause();
                playIcon.className = "fa-solid fa-play play-pause-btn"; // Меняем на иконку "Play"
                trackStatus.innerText = "Paused";
                playIcon.style.animation = "none";
            }
        }

        // Управление громкостью и закрашивание ползунка
        volumeControl.addEventListener('input', (e) => {
            const val = e.target.value;
            audio.volume = val;
            
            // Динамически закрашиваем зелёным пройденный путь ползунка
            const percentage = val * 100;
            e.target.style.backgroundSize = percentage + '% 100%';
        });

        // Запуск фоновых частиц
        particlesJS("particles-js", {
            "particles": {
                "number": { "value": 60, "density": { "enable": true, "value_area": 800 } },
                "color": { "value": "#55ff55" },
                "shape": { "type": "circle" },
                "opacity": { "value": 0.25, "random": true },
                "size": { "value": 2, "random": true },
                "line_linked": { "enable": true, "distance": 120, "color": "#55ff55", "opacity": 0.1, "width": 1 },
                "move": { "enable": true, "speed": 1.5, "direction": "none", "random": true, "straight": false, "out_mode": "out" }
            },
            "interactivity": { "events": { "onhover": { "enable": false } } },
            "retina_detect": true
        });
    </script>
</body>
</html>
